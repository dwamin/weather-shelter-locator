<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오프라인 - 쉴라잡이</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
        color: #14532d;
      }
      main {
        text-align: center;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        color: #166534;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>인터넷 연결이 없습니다</h1>
      <p>연결이 복구되면 최신 쉼터 정보를 다시 불러옵니다.</p>
    </main>
  </body>
</html>
